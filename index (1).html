<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch Accounts List</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        @import url(https://db.onlinewebfonts.com/c/468c67c3a57b93870b455fc4ec30dbe1?family=Shag-Lounge);
        @font-face {
            font-family: "Shag-Lounge";
            src: url("https://db.onlinewebfonts.com/t/468c67c3a57b93870b455fc4ec30dbe1.eot");
            src: url("https://db.onlinewebfonts.com/t/468c67c3a57b93870b455fc4ec30dbe1.eot?#iefix") format("embedded-opentype"),
                 url("https://db.onlinewebfonts.com/t/468c67c3a57b93870b455fc4ec30dbe1.woff2") format("woff2"),
                 url("https://db.onlinewebfonts.com/t/468c67c3a57b93870b455fc4ec30dbe1.woff") format("woff"),
                 url("https://db.onlinewebfonts.com/t/468c67c3a57b93870b455fc4ec30dbe1.ttf") format("truetype"),
                 url("https://db.onlinewebfonts.com/t/468c67c3a57b93870b455fc4ec30dbe1.svg#Shag-Lounge") format("svg");
        }

        :root {
            --scratch-orange: #ff6600;
            --scratch-orange-light: #ff8c33;
            --scratch-yellow: #ffab19;
            --bg-dark: #1a0a00;
            --bg-mid: #2b1200;
            --card-bg: #1f0f02;
            --card-border: #ff660044;
            --text-light: #fff5ee;
            --text-muted: #c8a080;
            --accent-glow: #ff660066;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Shag-Lounge", cursive, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            background-image:
                radial-gradient(ellipse at 20% 10%, #ff660015 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #ffab1910 0%, transparent 50%),
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 60px,
                    #ff660005 60px,
                    #ff660005 61px
                );
        }

        .page-wrapper {
            max-width: 700px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeDown 0.7s ease both;
        }

        .header-label {
            display: inline-block;
            font-size: 0.75rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--scratch-orange);
            background: #ff660018;
            border: 1px solid #ff660044;
            padding: 4px 14px;
            border-radius: 999px;
            margin-bottom: 18px;
        }

        h1 {
            font-size: clamp(2.4rem, 7vw, 4rem);
            color: var(--scratch-yellow);
            line-height: 1.1;
            text-shadow:
                0 0 30px #ff660088,
                0 0 60px #ff660044;
            letter-spacing: 0.02em;
        }

        h1 span {
            color: var(--scratch-orange);
        }

        /* ── Hero image ── */
        .hero-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 48px;
            animation: fadeUp 0.7s 0.2s ease both;
        }

        .hero-frame {
            position: relative;
            display: inline-block;
        }

        .hero-frame::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--scratch-orange), var(--scratch-yellow), var(--scratch-orange));
            z-index: 0;
            filter: blur(2px);
            opacity: 0.8;
        }

        .hero-frame img {
            position: relative;
            z-index: 1;
            display: block;
            border-radius: 12px;
            width: 144px;
            height: 108px;
            object-fit: cover;
        }

        /* ── Account list ── */
        .accounts-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .account-card {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px 24px;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
            animation: fadeUp 0.6s ease both;
        }

        .account-card:nth-child(1) { animation-delay: 0.3s; }
        .account-card:nth-child(2) { animation-delay: 0.42s; }
        .account-card:nth-child(3) { animation-delay: 0.54s; }
        .account-card:nth-child(4) { animation-delay: 0.66s; }

        .account-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, #ff660008 0%, transparent 70%);
            pointer-events: none;
        }

        .account-card:hover {
            border-color: var(--scratch-orange);
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 8px 32px #ff660030, 0 0 0 1px #ff660055;
        }

        .account-number {
            font-size: 2rem;
            color: var(--scratch-orange);
            font-family: "Shag-Lounge", cursive;
            min-width: 36px;
            text-align: center;
            line-height: 1;
            text-shadow: 0 0 12px #ff660088;
            flex-shrink: 0;
        }

        .account-divider {
            width: 2px;
            height: 44px;
            background: linear-gradient(to bottom, transparent, var(--scratch-orange), transparent);
            flex-shrink: 0;
            opacity: 0.5;
        }

        .account-info {
            flex: 1;
        }

        .account-name {
            font-size: 1.25rem;
            color: var(--scratch-yellow);
            letter-spacing: 0.02em;
            display: block;
            margin-bottom: 4px;
        }

        .account-url {
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            font-family: "Courier New", monospace;
            opacity: 0.7;
        }

        .account-arrow {
            font-size: 1.4rem;
            color: var(--scratch-orange);
            opacity: 0.5;
            transition: opacity 0.2s, transform 0.2s;
            flex-shrink: 0;
        }

        .account-card:hover .account-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            margin-top: 60px;
            color: var(--text-muted);
            font-size: 0.8rem;
            opacity: 0.5;
            animation: fadeUp 0.6s 0.8s ease both;
        }

        /* ── Animations ── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <header>
        <div class="header-label">Scratch</div>
        <h1>Accounts <span>List</span></h1>
    </header>

    <div class="hero-wrap">
        <div class="hero-frame">
            <img
                src="https://uploads.scratch.mit.edu/get_image/project/1283240703_144x108.png"
                alt="Featured Scratch Project"
            >
        </div>
    </div>

    <div class="accounts-list">

        <a href="https://scratch.mit.edu/users/joestrawberry2/" target="_blank" class="account-card">
            <div class="account-number">1</div>
            <div class="account-divider"></div>
            <div class="account-info">
                <span class="account-name">joestrawberry2</span>
                <span class="account-url">scratch.mit.edu/users/joestrawberry2/</span>
            </div>
            <div class="account-arrow">→</div>
        </a>

        <a href="https://scratch.mit.edu/users/joestrawberry2__/" target="_blank" class="account-card">
            <div class="account-number">2</div>
            <div class="account-divider"></div>
            <div class="account-info">
                <span class="account-name">joestrawberry2__</span>
                <span class="account-url">scratch.mit.edu/users/joestrawberry2__/</span>
            </div>
            <div class="account-arrow">→</div>
        </a>

        <a href="https://scratch.mit.edu/users/joestrawberry2_/" target="_blank" class="account-card">
            <div class="account-number">3</div>
            <div class="account-divider"></div>
            <div class="account-info">
                <span class="account-name">joestrawberry2_</span>
                <span class="account-url">scratch.mit.edu/users/joestrawberry2_/</span>
            </div>
            <div class="account-arrow">→</div>
        </a>

        <a href="https://scratch.mit.edu/users/idfb1/" target="_blank" class="account-card">
            <div class="account-number">4</div>
            <div class="account-divider"></div>
            <div class="account-info">
                <span class="account-name">idfb1</span>
                <span class="account-url">scratch.mit.edu/users/idfb1/</span>
            </div>
            <div class="account-arrow">→</div>
        </a>

    </div>

    <footer>
        &copy; Scratch Accounts List &mdash; All links open on Scratch
    </footer>

</div>

</body>
</html>
